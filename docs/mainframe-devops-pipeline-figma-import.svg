<?xml version="1.0" encoding="UTF-8"?>
<!--
  Figma: File - Place from computer, or drag this SVG onto the canvas.
  Then Object - Ungroup; replace rectangles with your icon components.

  Flow:
  Laptop - Git - Jenkins
  Jenkins branches to: Zowe CLI | Shell scripts | REXX
  Zowe: Upload PDS - Submit JCL - Compile COBOL - VSAM datasets
  VSAM datasets -(teal return)- Jenkins (next stages)
  Shell scripts - DB2 ; REXX - DB2 ; DB2 - PASS
  (No Bind DB2.)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#5c4033"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#0d9488"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f7f4ef"/>

  <text x="700" y="48" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="26" font-weight="700" fill="#374151">
    MAINFRAME DEVOPS: PROOF, NOT THEORY
  </text>
  <text x="700" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">
    Laptop - Git - Jenkins - Zowe + USS shell + REXX - DB2
  </text>

  <style>
    .node { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; }
    .node-strong { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; }
    .lbl { font-family: system-ui, -apple-system, Segoe UI, sans-serif; font-size: 13px; fill: #111827; }
    .lbl-sm { font-size: 11px; fill: #4b5563; }
    .edge { stroke: #5c4033; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .edge-loop { stroke: #0d9488; stroke-width: 2.5; fill: none; marker-end: url(#arrow-teal); }
  </style>

  <!-- Spine: Laptop Git Jenkins -->
  <rect class="node" x="60" y="320" width="100" height="56" rx="10"/>
  <text class="lbl" x="110" y="352" text-anchor="middle">Laptop</text>

  <rect class="node-strong" x="200" y="320" width="88" height="56" rx="10"/>
  <text class="lbl" x="244" y="352" text-anchor="middle">Git</text>

  <rect class="node-strong" x="328" y="292" width="120" height="104" rx="12"/>
  <text class="lbl" x="388" y="332" text-anchor="middle" font-weight="700">Jenkins</text>
  <text class="lbl lbl-sm" x="388" y="354" text-anchor="middle">hub: 3 branches</text>

  <line class="edge" x1="160" y1="348" x2="198" y2="348"/>
  <line class="edge" x1="288" y1="348" x2="326" y2="348"/>

  <!-- Jenkins fan-out: to Zowe, Shell, REXX -->
  <line class="edge" x1="448" y1="328" x2="518" y2="198"/>
  <line class="edge" x1="388" y1="396" x2="388" y2="468"/>
  <line class="edge" x1="420" y1="380" x2="498" y2="538"/>

  <text class="lbl lbl-sm" x="470" y="250" fill="#5c4033">Zowe</text>
  <text class="lbl lbl-sm" x="400" y="430" fill="#5c4033">Shell</text>
  <text class="lbl lbl-sm" x="455" y="470" fill="#5c4033">REXX</text>

  <!-- Zowe CLI + vertical chain -->
  <rect class="node-strong" x="518" y="158" width="134" height="56" rx="10"/>
  <text class="lbl" x="585" y="192" text-anchor="middle" font-weight="600">Zowe CLI</text>

  <rect class="node" x="545" y="238" width="160" height="44" rx="8"/>
  <text class="lbl" x="625" y="265" text-anchor="middle">Upload datasets (PDS)</text>
  <line class="edge" x1="585" y1="214" x2="625" y2="236"/>

  <rect class="node" x="545" y="298" width="160" height="44" rx="8"/>
  <text class="lbl" x="625" y="325" text-anchor="middle">Submit JCL</text>
  <line class="edge" x1="625" y1="282" x2="625" y2="296"/>

  <rect class="node" x="545" y="358" width="160" height="44" rx="8"/>
  <text class="lbl" x="625" y="385" text-anchor="middle">Compile COBOL</text>
  <line class="edge" x1="625" y1="342" x2="625" y2="356"/>

  <rect class="node" x="545" y="418" width="160" height="44" rx="8"/>
  <text class="lbl" x="625" y="445" text-anchor="middle">VSAM datasets</text>
  <line class="edge" x1="625" y1="402" x2="625" y2="416"/>

  <!-- VSAM return to Jenkins (left side of hub) -->
  <path class="edge-loop" d="M 545 440 C 400 480 340 400 332 348"/>
  <text class="lbl lbl-sm" x="420" y="472" text-anchor="middle" fill="#0f766e">outputs / next pipeline stages</text>

  <!-- Shell + REXX nodes -->
  <rect class="node" x="328" y="468" width="120" height="76" rx="10"/>
  <text class="lbl" x="388" y="498" text-anchor="middle">Shell scripts</text>
  <text class="lbl lbl-sm" x="388" y="516" text-anchor="middle">load_claims.sh</text>
  <text class="lbl lbl-sm" x="388" y="532" text-anchor="middle">generate_report.sh</text>

  <rect class="node" x="498" y="538" width="104" height="50" rx="10"/>
  <text class="lbl" x="550" y="568" text-anchor="middle" font-weight="600">REXX</text>
  <text class="lbl lbl-sm" x="550" y="582" text-anchor="middle">alerts</text>

  <!-- DB2 (simple cylinder) -->
  <ellipse class="node-strong" cx="1020" cy="392" rx="72" ry="22" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <rect class="node-strong" x="948" y="392" width="144" height="56" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <ellipse class="node-strong" cx="1020" cy="448" rx="72" ry="22" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text class="lbl" x="1020" y="432" text-anchor="middle" font-weight="700">DB2</text>

  <line class="edge" x1="448" y1="506" x2="946" y2="418"/>
  <line class="edge" x1="602" y1="563" x2="948" y2="438"/>

  <text class="lbl lbl-sm" x="720" y="395" text-anchor="middle">load / SQL via USS</text>
  <text class="lbl lbl-sm" x="760" y="515" text-anchor="middle">DSNREXX alerts</text>

  <line class="edge" x1="1092" y1="420" x2="1158" y2="420"/>
  <rect x="1158" y="392" width="104" height="56" rx="14" fill="#16a34a" stroke="#15803d" stroke-width="1.5"/>
  <text x="1210" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#ffffff">PASS</text>

  <rect class="node" x="60" y="600" width="600" height="96" rx="10"/>
  <text class="lbl" x="80" y="628" font-weight="600">Figma tips</text>
  <text class="lbl lbl-sm" x="80" y="650">Select all - Shift+A Auto layout horizontal for spine; vertical auto layout for Zowe stack.</text>
  <text class="lbl lbl-sm" x="80" y="668">Replace boxes with Phosphor / SF Symbols / Noun Project icons; keep arrow stroke 2px consistent.</text>
  <text class="lbl lbl-sm" x="80" y="686">Optional: add small &quot;VSAM validation&quot; row between VSAM datasets and the teal return arrow.</text>
</svg>
